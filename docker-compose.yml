services:
  backend:
    build:
      context: ./backend
      target: dev
    container_name: backend
    ports:
      - "${PORT_BACKEND:-48090}:8000"
    volumes:
      - ./backend:/app
    environment:
      - SCAN_SLOTS=${SCAN_SLOTS:-10}
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: frontend
    ports:
      - "${PORT_FRONTEND:-48091}:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_FOOTER_TEXT=${FOOTER_TEXT:-}
      - VITE_BACKEND_PORT=${PORT_BACKEND:-48090}
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  validator:
    build:
      context: ./validator
      target: dev
    container_name: validator
    ports:
      - "${PORT_VALIDATOR:-48092}:8082"
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:alpine
