services:
  backend:
    build:
      context: ./backend
      target: prod
    container_name: backend
    ports:
      - "${PORT_BACKEND:-48090}:8000"
    environment:
      - SCAN_SLOTS=${SCAN_SLOTS:-10}
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        - VITE_FOOTER_TEXT=${FOOTER_TEXT:-}
        - VITE_BACKEND_PORT=${PORT_BACKEND:-48090}
    container_name: frontend
    ports:
      - "${PORT_FRONTEND:-48091}:8080"
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:alpine
    restart: unless-stopped
