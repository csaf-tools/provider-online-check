[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --sensitive-url=^https?://localhost(:\d+)?(/.*)?$
markers =
    ui: UI tests that interact with the frontend
    integration: Integration tests with backend
    nondestructive: Marks tests as non-destructive
